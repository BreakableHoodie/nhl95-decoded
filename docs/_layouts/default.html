<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<script>
  (function () {
    var saved = localStorage.getItem('nhl95-theme');
    if (saved === 'light' || saved === 'dark') document.documentElement.setAttribute('data-theme', saved);
  })();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ page.title | default: site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏒</text></svg>">
<link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
</head>
<body>
<nav class="site-nav">
  <a class="brand" href="{{ '/' | relative_url }}">🏒 nhl95-decoded</a>
  <a class="nav-link{% if page.url == '/index.html' or page.url == '/' %} current{% endif %}" href="{{ '/' | relative_url }}">Home</a>
  <a class="nav-link{% if page.url contains 'OVERVIEW' %} current{% endif %}" href="{{ '/OVERVIEW.html' | relative_url }}">Plain English</a>
  <a class="nav-link{% if page.url contains 'FINDINGS' %} current{% endif %}" href="{{ '/FINDINGS.html' | relative_url }}">Full write-up</a>
  <a class="nav-link{% if page.url contains 'GLOSSARY' %} current{% endif %}" href="{{ '/GLOSSARY.html' | relative_url }}">Glossary</a>
  <a class="nav-link" href="{{ '/search.html' | relative_url }}">Search</a>
  <span class="spacer"></span>
  <div class="theme-switch" role="group" aria-label="Color theme">
    <button type="button" data-theme-choice="light" title="Light theme">☀</button>
    <button type="button" data-theme-choice="dark" title="Dark theme">☾</button>
    <button type="button" data-theme-choice="auto" title="Match system theme">Auto</button>
  </div>
  <a class="gh-link" href="https://github.com/BreakableHoodie/nhl95-decoded">Source ↗</a>
</nav>
<div class="page-wrap">
{{ content }}
</div>
<footer class="site-footer">
  Reverse-engineering NHL 95 (Genesis) — findings, tooling, and methodology at
  <a href="https://github.com/BreakableHoodie/nhl95-decoded">github.com/BreakableHoodie/nhl95-decoded</a>.
</footer>
<script>
  document.querySelectorAll('.page-wrap table').forEach(function (t) {
    var wrap = document.createElement('div');
    wrap.className = 'table-wrap';
    t.parentNode.insertBefore(wrap, t);
    wrap.appendChild(t);
  });

  (function () {
    var KEY = 'nhl95-theme';
    function setActive(mode) {
      document.querySelectorAll('.theme-switch button').forEach(function (b) {
        b.classList.toggle('active', b.dataset.themeChoice === mode);
      });
    }
    setActive(localStorage.getItem(KEY) || 'auto');
    document.querySelectorAll('.theme-switch button').forEach(function (b) {
      b.addEventListener('click', function () {
        var mode = b.dataset.themeChoice;
        if (mode === 'auto') {
          document.documentElement.removeAttribute('data-theme');
          localStorage.removeItem(KEY);
        } else {
          document.documentElement.setAttribute('data-theme', mode);
          localStorage.setItem(KEY, mode);
        }
        setActive(mode);
      });
    });
  })();
</script>
</body>
</html>
